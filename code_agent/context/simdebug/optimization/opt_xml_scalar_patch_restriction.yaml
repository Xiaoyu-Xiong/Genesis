  "id": "opt_xml_scalar_patch_restriction",
  "title": "Opt may only patch safe XML scalar attributes",
  "summary": "When Opt touches XML/MJCF assets, it must preserve topology and only change physically meaningful numeric attributes on existing named elements.",
  "scopes": ["planner", "opt", "critic"],
  "physics_modes": ["any"],
