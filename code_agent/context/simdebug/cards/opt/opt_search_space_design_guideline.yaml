{
  "schema_version": 1,
  "id": "opt_search_space_design_guideline",
  "title": "Opt search spaces should be compact, meaningful, and runner-native",
  "summary": "Opt should tune a small set of physically meaningful scalar variables, use log scaling for positive variables spanning orders of magnitude, and rely on the generic runner strategy knobs.",
  "scopes": ["planner", "opt"],
  "physics_modes": ["any"],
  "task_tags": [
    "opt",
    "optimization",
    "search_space",
    "bounds",
    "sigma",
    "log_scale",
    "strategy",
    "phases",
    "restarts",
    "early_stop"
  ],
  "failure_tags": [
    "too_many_variables",
    "irrelevant_parameter",
    "linear_scale_bad",
    "case_specific_search",
    "low_fidelity_shortcut"
  ],
  "guidance": [
    "Keep the search space small. Prefer 2-8 variables unless evidence justifies more.",
    "Prefer scale=\"log\" for positive variables spanning orders of magnitude, such as stiffness, damping, density, contact stiffness, tolerances, and controller gains.",
    "Use the runner's generic strategy knobs when useful rather than hand-coding task-specific search logic.",
    "strategy.phases can optimize one variable group at a time, strategy.restarts can run multiple seeds/sigma scales, and strategy.early_stop can stop after success or several non-improving generations.",
    "Do not use low-fidelity timing/render shortcuts unless Planner explicitly asks for them."
  ],
  "dispatch_hints": [
    "Send to Opt before creating opt_space.json or tuning CMA-ES strategy.",
    "Send to Planner when deciding whether a failure is close enough for bounded continuous search."
  ],
  "provenance": {
    "prompt_file": "code_agent/prompts/opt.py",
    "symbols": ["build_opt_prompt"]
  }
}
