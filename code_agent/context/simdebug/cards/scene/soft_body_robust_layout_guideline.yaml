  "schema_version": 1,
  "id": "soft_body_robust_layout_guideline",
  "title": "Soft-body scenes should use robust chunky geometry, positive clearances, and observable deformation",
  "summary": "FEM+IPC soft-body layouts should avoid thin fragile geometry and precise interlocks unless required, using conservative spacing, broad supports, and visible deformation metrics.",
  "scopes": ["planner", "scene", "body", "action", "critic", "opt"],
  "physics_modes": ["fem_ipc"],
  "task_tags": [
    "soft",
    "deformable",
    "layout",
    "fem",
    "ipc",
    "column",
