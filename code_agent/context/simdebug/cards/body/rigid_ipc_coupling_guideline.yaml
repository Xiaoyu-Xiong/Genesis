  "schema_version": 1,
  "id": "rigid_ipc_coupling_guideline",
  "title": "Choose rigid IPC coupling mode from the physical role",
  "summary": "Rigid IPC scenes should choose ipc_only, two_way_soft_constraint, or external_articulation based on whether IPC, Genesis controls, or articulated DOFs own the motion.",
  "scopes": ["planner", "body", "action", "critic", "opt"],
  "physics_modes": ["rigid_ipc", "fem_ipc"],
  "task_tags": [
    "ipc",
    "rigid",
    "coupling",
    "contact",
    "articulated",
