  "id": "collision_contact_restriction",
  "title": "Independent task objects should keep collision enabled by default",
  "summary": "Independent physical objects should default to mutually enabled collision/contact; avoid pair, mask, or contact-filter overrides except for narrowly scoped self-collision inside the same articulated body.",
  "scopes": ["planner", "scene", "body", "action", "critic", "opt"],
  "physics_modes": ["any"],
  "task_tags": [
