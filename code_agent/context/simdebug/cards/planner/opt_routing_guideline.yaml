{
  "schema_version": 1,
  "id": "opt_routing_guideline",
  "title": "Route to Opt only for runnable cases with bounded continuous residuals",
  "summary": "Planner should use Opt for close, physically plausible failures that can be improved by compact continuous parameters, and route structural failures back to source repair or asset regeneration.",
  "scopes": ["planner", "critic", "opt"],
  "physics_modes": ["any"],
  "task_tags": [
    "opt",
    "optimization",
    "continuous",
    "residual",
    "timing",
    "pose",
    "distance",
    "friction",
    "damping",
    "gain",
    "material",
    "layout",
    "solver"
  ],
  "failure_tags": [
    "structural_failure",
    "missing_entity",
    "invalid_asset",
    "broken_import",
    "absent_metrics",
    "invisible_behavior",
    "impossible_geometry",
    "caged_object",
    "stuck_mechanism"
  ],
  "guidance": [
    "Good Opt candidates are runnable cases with plausible entities, readable evidence, and continuous measurable misses.",
    "Continuous residuals may involve timing, target distance, pose, speed, angle, friction, damping, gain, initial layout, material/contact, XML scalar, or solver/contact tolerance.",
    "Bad Opt candidates are structural failures: missing entities, invalid assets, broken imports, impossible geometry, stuck mechanisms, absent metrics, invisible behavior, or task semantics that need rewriting.",
    "After useful Opt results, rerun execution so final artifacts reflect the selected params."
  ],
  "dispatch_hints": [
    "Send to planner when deciding run_opt versus request_repair/regeneration.",
    "Send to opt with the effective-parameter restriction when optimization is selected.",
    "Send to critic when deciding whether a failure is structural or parameter-limited."
  ],
  "provenance": {
    "prompt_files": ["code_agent/prompts/planner.py", "code_agent/prompts/opt.py"],
    "symbols": ["PLANNER_ACTION_POLICY_GUIDE", "build_opt_prompt"]
  }
}
