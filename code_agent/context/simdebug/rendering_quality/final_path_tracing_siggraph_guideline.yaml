schema_version: 1
id: final_path_tracing_siggraph_guideline
title: Complete a polished final GPU path-tracing pass
summary: Final delivery requires an accepted GPU path-traced render whose runtime contract, look-dev quality, replay provenance, and sampled frames all pass their focused SimDebug checks.
scopes: [planner, rendering, critic]
physics_modes: [any]
task_tags:
  - path_tracing
  - raytracer
  - final_render
  - quality_gate
  - iterative_lookdev
failure_tags:
  - opengl_style_render
  - final_path_tracing_missing
  - cropped_final_render
  - one_shot_final_render
  - missing_final_render_metadata
guidance:
  - After physical behavior is accepted, produce a final_path_traced or replay_render deliverable; debug raster evidence is not the final render.
  - Do not accept a final render whose render_stats.json has path_tracing.enabled=false.
  - Use raytracer_runtime_contract_guideline for GPU, OptiX, integrator, denoiser, renderer-construction, and mesh-channel correctness.
  - Use path_traced_lookdev_guideline for background, lighting, soft shadows, material semantics, transparency, and iterative visual refinement.
  - Use physics_state_cache_replay_guideline and render_replay_consistency_guideline whenever final look-dev reuses accepted simulated motion.
  - Final path tracing is iterative. A technically successful first RayTracer output is a preview, not automatic visual acceptance; repair the responsible rendering, scene, or existing material parameters and rerun until final_render.status is passed.
  - Render-only look-dev should preserve accepted physics and geometry. Return to physics repair only for a severe, fundamental physical error that final rendering or replay repair cannot reasonably resolve.
  - Final render_stats.json must record path_tracing.enabled, render_profile, runtime validation status, look-dev validation status, camera, frame count, final_render status, and replay/cache provenance when replay is used.
restrictions:
  - Do not finish a case from debug raster evidence when final path tracing is required.
  - Do not treat successful renderer startup as proof that framing, lighting, materials, motion, or replay consistency are acceptable.
  - Do not weaken runtime or replay validation to obtain a visually plausible final video.
checks:
  - Check that raytracer_runtime_contract_guideline and path_traced_lookdev_guideline were both applied to the final pass.
  - Inspect start, mid, and end frames for cropping, missing actors, unreadable motion, and visual regressions.
  - Check render_stats.json records path_tracing.enabled=true and final_render.status=passed together with runtime and look-dev evidence.
  - For replay outputs, check replay_only=true and physics_cache_manifest and require render_replay_consistency_guideline to pass.
dispatch_hints:
  - Send to Planner whenever physics has passed and final rendering remains.
  - Send to rendering for final-pass coordination and repeated look-dev execution.
  - Send to Critic for the final aggregate acceptance decision.
provenance:
  source: path_tracing_workflow
  motivation: Keep final delivery mandatory while delegating technical runtime and visual look-dev details to focused cards.
