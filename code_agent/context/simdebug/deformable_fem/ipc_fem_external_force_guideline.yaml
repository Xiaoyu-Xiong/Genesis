  "id": "ipc_fem_external_force_guideline",
  "title": "Use verified libuipc external-force attributes for FEM forces",
  "summary": "For FEM+IPC scenes that need direct physical force, register uipc.constitution.FiniteElementExternalForce before IPC world initialization and prevent its vertices.is_constrained mask from also activating SoftPositionConstraint: disable vertex constraints when no real anchors are needed, or preserve real anchors and set vertices.strength_ratio=0 on every force-only vertex before IPC advance.",
  "scopes": ["planner", "body", "action", "critic", "opt"],
  "physics_modes": ["fem_ipc"],
  "task_tags": [
    "fem",
    "ipc",
    "libuipc",
    "external_force",
    "force",
    "impulse",
    "disturbance",
    "soft_body",
