    "verified_details": [
      "uipc.constitution.FiniteElementExternalForce is available in the local pyuipc package.",
      "FiniteElementExternalForce.apply_to creates vertices.external_force and vertices.is_constrained on a volumetric FEM SimplicialComplex.",
      "The observed vertices.external_force layout in the smoke test is (N, 3, 1).",
      "Applying SoftPositionConstraint and FiniteElementExternalForce to the same local tetrahedral geometry showed that they share vertices.is_constrained; a force-masked vertex retained aim_position at its rest position and strength_ratio=100 until explicitly changed.",
      "Genesis IPCCoupler initializes FEM vertex-constraint strength to 100 and may rewrite is_constrained, aim_position, and strength_ratio during _update_fem_vertex_constraint_targets, so force-only strength must be cleared after that update.",
      "Historical clean passes used either enable_vertex_constraints=False (green dragon post field, purple bunny, blue bunny) or strength_ratio=0 on force-only vertices while preserving real anchors (localized green dragon, giraffe, planar snap-through cloth).",
      "Historical double-helix and desert-shrub runs completed without this guard but mixed external force with a soft positional tether; completion and visual acceptance are therefore not proof that the force channel is uncontaminated.",
      "Writing +x force to all 1657 FEM vertices for 30 steps and calling coupler._ipc_world.sync() produced +0.0186076 m FEM COM displacement over a no-force baseline of 0.0 m."
    ]
  }
