    "is_constrained",
    "strength_ratio"
  ],
  "failure_tags": [
    "unsupported_fem_force_shape",
    "force_applications_zero",
    "fem_force_not_registered_before_world_init",
    "missing_external_force_attr",
    "missing_is_constrained_attr",
    "missing_strength_ratio_attr",
    "world_sync_missing",
    "static_soft_body",
