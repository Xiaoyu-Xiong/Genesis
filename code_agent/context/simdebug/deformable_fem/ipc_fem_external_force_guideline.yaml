  "id": "ipc_fem_external_force_guideline",
  "title": "Use verified libuipc external-force attributes for FEM forces",
  "summary": "For FEM+IPC scenes that truly need direct physical force on a deformable body, register uipc.constitution.FiniteElementExternalForce on FEM IPC geometries before IPC world initialization, then update vertices.external_force and vertices.is_constrained with shape checks, sync, and motion evidence.",
  "scopes": ["planner", "body", "action", "critic", "opt"],
  "physics_modes": ["fem_ipc"],
  "task_tags": [
    "fem",
    "ipc",
    "libuipc",
    "external_force",
    "force",
    "impulse",
    "disturbance",
