  "schema_version": 1,
  "id": "fem_actuation_channel_guideline",
  "title": "Prefer verified FEM vertex constraints for boundary control",
  "summary": "FEM+IPC soft-body and cloth boundary actions should prefer the verified FEMEntity vertex-constraint path for pinned or driven endpoints, edges, rims, and handle patches, while using contact-driven tools for contact, rolling, squeezing, impact, or force-driven motion.",
  "scopes": ["planner", "body", "action", "critic", "opt"],
  "physics_modes": ["fem_ipc"],
  "task_tags": [
    "fem",
    "ipc",
