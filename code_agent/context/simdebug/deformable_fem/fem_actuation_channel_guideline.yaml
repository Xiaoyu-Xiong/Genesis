    "motivation": "Older FEM runs scheduled disturbances or constraints through unsupported channels, but FEMEntity.set_vertex_constraints is now implemented and render-tested for FEM and cloth under IPCCoupler, including fixed world targets, moving endpoints, static rigid-link targets, and moving rigid-link targets."
  }
}
