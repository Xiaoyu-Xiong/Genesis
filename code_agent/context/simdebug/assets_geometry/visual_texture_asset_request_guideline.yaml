  "id": "visual_texture_asset_request_guideline",
  "title": "Use generated mesh assets for textured or complex static objects",
  "summary": "When requested appearance depends on texture, pattern, ornamentation, or complex non-articulated object structure, Planner should prefer Meshy-generated mesh assets over primitive approximations.",
  "scopes": ["planner", "body", "rendering", "critic"],
  "physics_modes": ["any"],
  "task_tags": [
