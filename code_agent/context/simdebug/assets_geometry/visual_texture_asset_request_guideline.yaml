  "id": "visual_texture_asset_request_guideline",
  "title": "Use generated mesh assets for textured or complex static objects",
  "summary": "When requested appearance depends on texture, pattern, ornamentation, or complex non-articulated object structure, Planner should prefer Meshy-generated mesh assets over primitive approximations. This preference applies to non-cloth objects and volumetric/generated assets; it must not override FEM.Cloth cloth_mesh shape limits.",
  "scopes": ["planner", "body", "rendering", "critic"],
  "physics_modes": ["any"],
  "task_tags": [
    "texture",
    "pattern",
    "decorative",
    "visual_ornamentation",
    "generated_mesh",
    "asset_request",
    "surface_detail"
  ],
  "failure_tags": [
    "plain_primitive_fake",
    "missing_texture",
