{
  "schema_version": 1,
  "id": "generated_mesh_manifest_usage_guideline",
  "title": "Generated mesh workers should use the asset manifest, not guessed paths or ad hoc replacements",
  "summary": "Generated mesh and cloth mesh assets must be instantiated from ready asset_manifest entries with their runtime mesh, scale, coordinate metadata, texture metadata, and simulation role preserved.",
  "scopes": ["planner", "body", "rendering", "critic"],
  "physics_modes": ["any"],
  "task_tags": [
    "generated_mesh",
    "cloth_mesh",
    "asset_manifest",
    "runtime_path",
    "visual_path",
    "texture_path",
    "scale",
    "orientation",
    "mesh",
    "asset"
  ],
  "failure_tags": [
    "missing_manifest_entry",
    "invalid_mesh",
    "guessed_mesh_path",
    "wrong_scale",
    "visual_mesh_instantiated_as_body",
    "ad_hoc_primitive_replacement"
  ],
  "guidance": [
    "For generated mesh assets, read assets/asset_manifest.json and use entries with source_type == generated_mesh and status == ready.",
    "For FEM cloth assets, read entries with source_type == cloth_mesh and status == ready; these are surface meshes for gs.materials.FEM.Cloth. Procedural sheet/ribbon assets may be open surfaces; Meshy-generated cloth shells are closed manifold surfaces.",
    "For procedural FEM cloth assets, inspect validation.cloth_mesh.target_edge_length, median_edge_length, and face_count to verify the Planner's requested cloth_target_edge_length produced an appropriate resolution.",
    "For Meshy-generated FEM cloth shells, inspect validation.cloth_mesh.generation == meshy, validation.cloth_mesh.manifold, and validation.cloth_mesh.genesis_cloth_import before instantiating the asset.",
    "Instantiate runtime geometry from entry.runtime_path using the manifest scale, file_meshes_are_zup metadata, visual_path, and intended fixed/dynamic role.",
    "runtime_path is the strict-manifold simulation/collision mesh.",
    "visual_path is a seam-aware textured render mesh attached to the same rigid entity, not a separate object to instantiate as an independent simulation body.",
    "texture_path is evidence metadata for the transferred base-color image and texture preview checks.",
    "Use the manifest's logical names, scale factors, coordinate metadata, texture paths, and simulation roles instead of guessing mesh paths, sizes, or orientation.",
    "If a generated mesh manifest entry is missing, failed, invalid, or cannot be imported, fail clearly and report that Planner should regenerate the mesh asset; do not edit mesh files or approximate the object with ad hoc primitives."
  ],
  "dispatch_hints": [
    "Send to body/rendering when generated mesh assets are being instantiated.",
    "Send to critic when mesh scale, texture, orientation, or manifest consistency is part of the evidence.",
    "Send to planner when deciding whether to update mesh metadata or regenerate an asset."
  ],
  "provenance": {
    "prompt_files": ["code_agent/prompts/worker.py", "code_agent/prompts/planner.py", "code_agent/prompts/critic.py"],
    "symbols": ["RIGID_API_GUIDE", "planner_available_actions_section", "CRITIC_VISUAL_EVIDENCE_GUIDE"]
  }
}
