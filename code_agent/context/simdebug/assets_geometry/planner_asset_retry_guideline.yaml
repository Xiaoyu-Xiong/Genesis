  "id": "planner_asset_retry_guideline",
  "title": "Planner asset retries should rewrite the owning asset request, not patch around bad assets",
  "summary": "Planner should distinguish intrinsic generated-asset defects from metadata-only issues and route retries through the correct mesh/XML asset action with a complete revised planner_output.",
