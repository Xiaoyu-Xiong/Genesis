  "id": "fem_ipc_initial_geometry_restriction",
  "kind": "restriction",
  "title": "FEM+IPC scenes need one support surface and conservative positive clearances",
  "summary": "FEM+IPC initialization should avoid duplicate IPC support planes, coincident contact surfaces, and rotated primitive placements that rely on under-estimated extents.",
  "scopes": ["planner", "scene", "body", "critic"],
  "physics_modes": ["fem_ipc"],
