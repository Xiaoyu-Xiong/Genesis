{
  "schema_version": 1,
  "id": "opt_effective_parameter_restriction",
  "kind": "restriction",
  "title": "Optimized variables must affect runtime behavior and be measured",
  "summary": "Opt should expose only compact, physically meaningful continuous variables whose sampled values survive generated-code clamps and are reported as effective runtime values.",
  "scopes": ["planner", "opt", "critic"],
  "physics_modes": ["any"],
  "task_tags": [
    "opt",
    "optimization",
    "parameter",
    "continuous",
    "search",
    "metric",
    "controller",
    "gain",
