{
  "schema_version": 1,
  "id": "render_visual_evidence_restriction",
  "kind": "restriction",
  "title": "Visual evidence must be readable enough to judge the requested behavior",
  "summary": "Generated videos and contact sheets should clearly show task-relevant objects, contacts, and motion; unclear rendering should be repaired rather than accepted.",
  "scopes": ["planner", "rendering", "critic", "opt"],
  "physics_modes": ["any"],
  "task_tags": [
    "render",
    "video",
    "visual",
    "camera",
    "lighting",
    "contact_sheet",
    "frame",
    "evidence",
    "texture",
    "manifest",
    "material_binding"
  ],
  "failure_tags": [
    "cropped",
    "occluded",
    "tiny_objects",
    "blank_frame",
    "poorly_lit",
    "static_camera",
    "unreadable_video",
    "missing_video"
  ],
  "restrictions": [
    "Do not treat unclear rendering as acceptable when the simulation behavior cannot be judged.",
    "Do not let opt report success or partial success from numeric score alone when visual evidence is missing, unreadable, or contradicts the goal.",
    "Camera position, lookat, field of view, clipping, lighting, background, capture cadence, and resolution should make the task behavior inspectable.",
    "When sampled frame paths, contact sheets, texture summaries, or texture-presence warnings are available, use them as review evidence alongside numeric metrics instead of relying only on event logs."
  ],
  "checks": [
    "Inspect sampled frames or video before accepting success.",
    "Record final camera and rendering choices in render_stats.json when the generated case supports it.",
    "If meshes or textures are involved, check whether orientation, scale, material binding, and rendered texture appearance are consistent with the source and manifest."
  ],
  "dispatch_hints": [
    "Send to rendering when evidence is hard to inspect because of view, lighting, cropping, or capture choices.",
    "Send to critic and opt when deciding whether numeric success is trustworthy."
  ],
  "provenance": {
    "prompt_files": ["code_agent/prompts/common.py", "code_agent/prompts/critic.py"],
    "symbols": ["RENDER_CLARITY_GUIDE", "GENERATED_RESULT_QUALITY_GUIDE", "CRITIC_VISUAL_EVIDENCE_GUIDE"]
  }
}
