  "schema_version": 1,
  "id": "visual_style_readability_guideline",
  "title": "Use readable, appealing visual styling for simulation evidence",
  "summary": "Planner, asset decisions, scene/body/rendering workers, and Critic should treat visual readability and tasteful object styling as soft quality goals alongside semantics and physics.",
  "scopes": ["planner", "asset", "scene", "body", "rendering", "critic", "opt"],
  "physics_modes": ["any"],
  "task_tags": [
