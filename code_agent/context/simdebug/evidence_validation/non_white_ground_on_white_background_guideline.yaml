  "id": "non_white_ground_on_white_background_guideline",
  "title": "Use visible ground contrast on light backgrounds",
  "summary": "When a render uses a white, near-white, or light studio background and includes a ground plane, use a subtly non-white ground unless the prompt explicitly requests white ground.",
  "scopes": ["planner", "scene", "rendering", "critic"],
