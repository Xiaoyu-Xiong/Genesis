  "kind": "guideline",
  "title": "Evaluate generated assets before blaming only action timing",
  "summary": "When a task depends on generated mesh or XML morphology, inspect shape, topology, joints, actuator affordances, scale, and orientation before assigning a local body/action repair.",
  "scopes": ["planner", "critic"],
  "physics_modes": ["any"],
