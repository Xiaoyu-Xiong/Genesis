  "schema_version": 1,
  "id": "xml_asset_request_contract_guideline",
  "kind": "guideline",
  "title": "XML/MJCF asset requests should describe mechanism affordances and preserve actuator contracts",
  "summary": "Planner should request XML/MJCF assets for articulated mechanisms with explicit joints, actuators, base behavior, dimensions, and downstream body/action contracts.",
  "scopes": ["planner", "body", "action", "critic"],
  "physics_modes": ["any"],
  "task_tags": [
    "xml",
    "mjcf",
    "urdf",
    "articulated",
    "robot",
    "gripper",
    "gate",
    "latch",
