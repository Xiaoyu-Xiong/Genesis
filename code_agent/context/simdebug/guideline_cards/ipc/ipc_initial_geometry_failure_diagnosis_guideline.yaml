  "kind": "guideline",
  "title": "Initial IPC world failures usually point to geometry, spacing, or asset validity",
  "summary": "When libuipc reports invalid initial geometry before a rigid ABD accessor exception, route the repair to placement, scale, clearance, orientation, or generated asset topology before blaming IPC capability.",
