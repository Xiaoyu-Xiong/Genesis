schema_version: 1
id: physics_state_cache_replay_guideline
title: Save physics state caches for render-only replay
summary: Physics runs should be able to save a manifest plus per-frame npz state files so final rendering can replay accepted motion without stepping physics again.
scopes: [planner, action, rendering, critic]
physics_modes: [any]
task_tags:
  - state_cache
  - replay
  - npz
  - render_only
  - final_render
failure_tags:
  - missing_state_cache
  - missing_npz
  - stale_cache
  - replay_failed
  - cache_source_mismatch
  - missing_articulated_qpos
  - incomplete_actor_state_contract
guidance:
  - When requested, every physics run must write artifacts/state_cache/manifest.json and artifacts/state_cache/states/frame_*.npz.
  - The npz files are a hard requirement. Do not accept a cache manifest whose frame entries cannot be opened as NumPy npz files.
  - Rigid caches should save per-frame transforms or positions/quaternions for dynamic rigid actors.
  - Articulated rigid bodies must save a complete replayable generalized state on every frame: prefer qpos and also record DOF positions when the API exposes them. Root pose alone is insufficient because it cannot reproduce joint/link motion.
  - Every manifest must declare an actor contract with each actor's replay mode, required per-frame NPZ arrays, expected shapes, DOF count, and actor identity. Validation must reject any frame that omits or changes a required channel.
  - FEM, deformable, and cloth caches should save visible or state vertices, faces references, bboxes, and centers of mass when available.
  - Static geometry, materials, actor names, source hashes, sim_dt, substeps, backend, and capture steps should be recorded in the manifest.
  - Render-only replay must read a validated manifest and must not call scene.step().
restrictions:
  - Do not run final replay from a cache that lacks readable frame npz files.
  - Do not treat event_log positions alone as sufficient for final replay when full state cache was requested.
  - Do not reuse a cache after source hashes or physics run identity no longer match the accepted physical run.
  - Do not mark an articulated cache replayable when it contains only root positions/quaternions but no qpos or DOF-position channel.
checks:
  - Check manifest.json exists and lists every frame step and relative npz path.
  - Check every referenced npz file exists and np.load can open it before replay begins.
  - Check every actor contract against every NPZ frame; articulated qpos/DOF arrays and deformable state-position arrays must be present, finite, and shape-stable.
  - During replay, require each contracted actor to exist in the rebuilt scene and require the matching set_qpos, set_dofs_position, set_position, or pose setter to succeed before rendering the frame.
  - Check render_stats.json records replay_only, physics_cache_manifest, and physics run/source identifiers when replay is used.
dispatch_hints:
  - Send to action when physics stepping should save state.
  - Send to rendering when final rendering should replay from cache.
  - Send to Critic when judging cache freshness and replay validity.
provenance:
  source: path_tracing_debug_card_workflow
  motivation: Avoid rerunning accepted physics while tuning final path-traced rendering.
